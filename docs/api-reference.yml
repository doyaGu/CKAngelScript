{
  "schemaVersion": 1,
  "title": "CKAngelScript API Reference",
  "subtitle": "Generated from the live AngelScript engine after CKAngelScript finishes registration.",
  "fallbackGroup": "misc",
  "groups": [
    {
      "id": "script-api",
      "title": "Script Workflow API",
      "overview": "Task-oriented APIs for scene lookup, runtime scripts, behavior graphs, Building Blocks, parameters, messages, and frame-based async work.",
      "order": 1
    },
    {
      "id": "native-interop",
      "title": "Native Interop",
      "overview": "Native pointer, buffer, dynamic library, DynCall, and callback helpers. Treat these APIs as unsafe interop surfaces.",
      "order": 2
    },
    {
      "id": "ck-bindings",
      "title": "Virtools CK Bindings",
      "overview": "CK2 SDK bindings exposed close to their native names. Prefer the workflow APIs for durable script behavior.",
      "order": 3
    },
    {
      "id": "vx-bindings",
      "title": "Virtools Vx Bindings",
      "overview": "Virtools Vx math, geometry, color, transform, and utility bindings.",
      "order": 4
    },
    {
      "id": "script-addons",
      "title": "AngelScript Add-ons",
      "overview": "Registered AngelScript add-ons plus project container and string helper types.",
      "order": 5
    },
    {
      "id": "misc",
      "title": "Miscellaneous Bindings",
      "overview": "Global helpers and symbols that do not belong to the workflow APIs or a named Virtools binding family.",
      "order": 6
    }
  ],
