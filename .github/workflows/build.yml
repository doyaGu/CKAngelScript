name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PROJECT_NAME: CKAngelScript
  BASE_BUILD_DIR: ${{ github.workspace }}\build
  BASE_DIST_DIR: ${{ github.workspace }}\dist
  PACKAGE_DIR: ${{ github.workspace }}\packages

jobs:
  validate-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Validate release version markers
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "Release tag must use vX.Y.Z or vX.Y.Z.W format: $tag"
          }

          $version = $tag.Substring(1)
          $cmake = Get-Content -LiteralPath 'CMakeLists.txt' -Raw
          if ($cmake -notmatch "project\s*\(\s*CKAngelScript\s+VERSION\s+$([regex]::Escape($version))(\s|\))") {
            throw "CMakeLists.txt project VERSION must be $version"
          }

  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [ Release, Debug ]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Checkout Virtools SDK
        uses: actions/checkout@v6.0.2
        with:
          repository: doyaGu/Virtools-SDK-2.1
          path: Virtools-SDK-2.1

      - name: Show tool versions
        shell: pwsh
        run: cmake --version

      - name: Set build metadata
        shell: pwsh
        run: |
          $shortSha = git rev-parse --short HEAD
          "SHORT_SHA=$shortSha" >> $env:GITHUB_ENV

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
        with:
          arch: x86

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -G "Visual Studio 17 2022" -A Win32 -B "${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}"
          -DCKAS_BUILD_SELF_TESTS=ON
          -DVIRTOOLS_SDK_PATH="${{ github.workspace }}\Virtools-SDK-2.1"
          -DCMAKE_INSTALL_PREFIX="${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}"

      - name: Build the project
        shell: pwsh
        run: cmake --build "${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}" --config ${{ matrix.configuration }}

      - name: Install binaries to distribution folder
        shell: pwsh
        run: >
          cmake --install "${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}"
          --prefix "${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}"
          --config ${{ matrix.configuration }}

      - name: Upload main distribution artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CKAngelScript-${{ env.SHORT_SHA }}-${{ matrix.configuration }}
          path: ${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}
          retention-days: 14

      - name: Upload release distribution artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-${{ matrix.configuration }}
          path: ${{ env.BASE_DIST_DIR }}\${{ matrix.configuration }}
          retention-days: 14

      - name: Upload release runtime binary
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-Runtime-Binary
          path: ${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}\src\Release\AngelScript.dll
          retention-days: 14

      - name: Upload debug symbols
        if: startsWith(github.ref, 'refs/tags/v') && matrix.configuration == 'Debug'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-Debug-Symbols
          path: ${{ env.BASE_BUILD_DIR }}\${{ matrix.configuration }}\src\Debug\AngelScript.pdb
          if-no-files-found: error
          retention-days: 14

  package-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ validate-release, build ]
    runs-on: windows-latest

    steps:
      - name: Download Release distribution
        uses: actions/download-artifact@v8.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-Release
          path: ${{ github.workspace }}\artifacts\release

      - name: Download Debug distribution
        uses: actions/download-artifact@v8.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-Debug
          path: ${{ github.workspace }}\artifacts\debug

      - name: Create release packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.PACKAGE_DIR }}" | Out-Null
          Compress-Archive -Path "${{ github.workspace }}\artifacts\release\*" -DestinationPath "${{ env.PACKAGE_DIR }}\CKAngelScript-${{ github.ref_name }}-Release.zip" -Force
          Compress-Archive -Path "${{ github.workspace }}\artifacts\debug\*" -DestinationPath "${{ env.PACKAGE_DIR }}\CKAngelScript-${{ github.ref_name }}-Debug.zip" -Force

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-Release-Packages
          path: ${{ env.PACKAGE_DIR }}\*.zip
          retention-days: 30

  draft-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ package-release ]
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: CKAngelScript-${{ github.ref_name }}-Release-Packages
          path: ${{ github.workspace }}\packages

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @(Get-ChildItem -LiteralPath "${{ github.workspace }}\packages" -Filter '*.zip')
          if ($assets.Count -ne 2) {
            throw "Expected 2 release packages, found $($assets.Count)"
          }

          $assetPaths = @($assets | ForEach-Object { $_.FullName })
          $releaseJson = gh release view $tag --json isDraft 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag @assetPaths --draft --title $tag --notes "Draft release for $tag." --verify-tag
            exit $LASTEXITCODE
          }

          $release = $releaseJson | ConvertFrom-Json
          if (-not $release.isDraft) {
            Write-Host "Release $tag already exists and is not a draft; skipping asset upload."
            exit 0
          }

          gh release upload $tag @assetPaths --clobber
